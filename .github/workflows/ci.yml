name: CI

on:
  push:
    branches: [main master develop]
  pull_request:
    branches: [main master develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
        continue-on-error: true
      - run: npm ci
        continue-on-error: true
      - run: npm test
        continue-on-error: true
